<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="pasta" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8b84a"/>
      <stop offset="100%" stop-color="#c89030"/>
    </linearGradient>
    <linearGradient id="sauce" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#8e2218"/>
    </linearGradient>
    <linearGradient id="ricotta" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffef5"/>
      <stop offset="100%" stop-color="#ede0c8"/>
    </linearGradient>
    <linearGradient id="topCheese" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe566"/>
      <stop offset="50%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#c89030"/>
    </linearGradient>
    <linearGradient id="sideDark" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="rgba(0,0,0,0.25)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.4)"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- === BOTTOM FACE (closes the 3D shape) === -->
    <polygon points="10,50 48,50 56,54 18,54" fill="#8a6520"/>

    <!-- === FRONT FACE LAYERS (wavy edges, bottom to top) === -->
    <!-- Bottom pasta -->
    <path d="M10,46 Q19,45.2 29,46.3 Q39,47 48,46 L48,50 L10,50 Z" fill="url(#pasta)"/>
    <!-- Sauce 1 -->
    <path d="M10,41.5 Q20,40.5 30,41.8 Q40,42.5 48,41 L48,46 Q39,47 29,46.3 Q19,45.2 10,46 Z" fill="url(#sauce)"/>
    <!-- Mid pasta -->
    <path d="M10,37 Q18,37.8 28,36.8 Q38,37.5 48,37 L48,41 Q40,42.5 30,41.8 Q20,40.5 10,41.5 Z" fill="url(#pasta)"/>
    <!-- Ricotta -->
    <path d="M10,32.5 Q21,31.5 31,32.8 Q41,33.2 48,32 L48,37 Q38,37.5 28,36.8 Q18,37.8 10,37 Z" fill="url(#ricotta)"/>
    <!-- Upper pasta -->
    <path d="M10,28 Q19,28.8 29,27.8 Q39,28.5 48,28 L48,32 Q41,33.2 31,32.8 Q21,31.5 10,32.5 Z" fill="url(#pasta)"/>
    <!-- Sauce 2 -->
    <path d="M10,24.3 Q20,23.5 30,24.5 Q40,25 48,24 L48,28 Q39,28.5 29,27.8 Q19,28.8 10,28 Z" fill="url(#sauce)"/>
    <!-- Top pasta -->
    <path d="M10,20 L48,20 L48,24 Q40,25 30,24.5 Q20,23.5 10,24.3 Z" fill="url(#pasta)"/>

    <!-- === RIGHT SIDE FACE (same layers, darkened) === -->
    <polygon points="48,20 56,24 56,54 48,50" fill="#b87a22"/>
    <!-- Side layer lines -->
    <line x1="48" y1="24" x2="56" y2="28" stroke="#a06a1a" stroke-width="0.5" opacity="0.7"/>
    <line x1="48" y1="28" x2="56" y2="32" stroke="#a06a1a" stroke-width="0.5" opacity="0.7"/>
    <line x1="48" y1="32" x2="56" y2="36" stroke="#a06a1a" stroke-width="0.5" opacity="0.7"/>
    <line x1="48" y1="37" x2="56" y2="41" stroke="#a06a1a" stroke-width="0.5" opacity="0.7"/>
    <line x1="48" y1="41" x2="56" y2="45" stroke="#a06a1a" stroke-width="0.5" opacity="0.7"/>
    <line x1="48" y1="46" x2="56" y2="50" stroke="#a06a1a" stroke-width="0.5" opacity="0.7"/>
    <!-- Darken overlay on side -->
    <polygon points="48,20 56,24 56,54 48,50" fill="url(#sideDark)"/>
    <!-- Sauce stripes on side -->
    <polygon points="48,24 56,28 56,32 48,28" fill="#8e2218" opacity="0.6"/>
    <polygon points="48,41 56,45 56,50 48,46" fill="#8e2218" opacity="0.6"/>
    <!-- Ricotta stripe on side -->
    <polygon points="48,32 56,36 56,41 48,37" fill="#d8ccb0" opacity="0.5"/>

    <!-- === TOP FACE === -->
    <polygon points="10,20 48,20 56,24 18,24" fill="#c89030"/>

    <!-- Melted cheese on top — bubbly golden surface -->
    <path d="M10 20 Q16 15 22 19 Q28 14 34 18 Q40 14 48 20 L56 24 L18 24 Z" fill="url(#topCheese)"/>
    <!-- Browned cheese spots -->
    <ellipse cx="24" cy="20" rx="2.5" ry="1.2" fill="#c88a18" opacity="0.4"/>
    <ellipse cx="38" cy="19" rx="2" ry="1" fill="#c88a18" opacity="0.35"/>
    <ellipse cx="48" cy="21.5" rx="1.5" ry="0.8" fill="#c88a18" opacity="0.3"/>
    <!-- Cheese bubbles -->
    <circle cx="20" cy="20.5" r="1" fill="#ffe880" opacity="0.5"/>
    <circle cx="42" cy="19.5" r="0.8" fill="#ffe880" opacity="0.4"/>

    <!-- === CHEESE DRIPS (organic curves) === -->
    <path d="M16 20 C14 24, 15 27, 17 30 C16.5 31, 17.5 32, 17 33" stroke="#daa520" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M16 20 C14 24, 15 27, 17 30" stroke="#e8c840" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M40 20 C42 23, 41 25, 40 28" stroke="#daa520" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M40 20 C42 23, 41 25, 40 28" stroke="#e8c840" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M28 20 C27 22, 28 24, 27.5 25.5" stroke="#e8c840" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <!-- Drip on right side -->
    <path d="M50 22 C52 26, 51 29, 52 32" stroke="#c89030" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>

    <!-- Sauce texture dots -->
    <circle cx="18" cy="43" r="1" fill="#a02018" opacity="0.4"/>
    <circle cx="32" cy="42.5" r="0.8" fill="#a02018" opacity="0.35"/>
    <circle cx="42" cy="44" r="0.7" fill="#a02018" opacity="0.3"/>
    <!-- Ricotta texture -->
    <circle cx="22" cy="34" r="1.2" fill="#f8f0e0" opacity="0.4"/>
    <circle cx="38" cy="35" r="0.9" fill="#f8f0e0" opacity="0.35"/>
  </g>

  <!-- Steam wisps (outside shadow group) -->
  <path d="M20 13 C18 9, 20 6, 22 3" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.25" stroke-linecap="round"/>
  <path d="M34 11 C36 7, 34 4, 36 1" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.2" stroke-linecap="round"/>
</svg>
